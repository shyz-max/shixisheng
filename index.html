<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MES 零件出库申请编排工具</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <aside class="sidebar">
    <div>
      <p class="eyebrow">MES FLOW BUILDER</p>
      <h1>零件出库申请工具</h1>
    </div>
    <nav class="tabs" aria-label="功能区">
      <button class="tab active" data-tab="login">系统登录</button>
      <button class="tab" data-tab="workflow">流程步骤</button>
      <button class="tab" data-tab="parts">零件模板</button>
      <button class="tab" data-tab="settings">执行设置</button>
      <button class="tab" data-tab="preview">配置预览</button>
    </nav>
    <div class="storage">
      <button id="saveConfig">保存</button>
      <button id="exportConfig">导出 JSON</button>
      <label class="file-button">
        导入 JSON
        <input id="importConfig" type="file" accept="application/json">
      </label>
    </div>
  </aside>

  <main class="app">
    <section class="topbar">
      <div>
        <label for="flowName">流程名称</label>
        <input id="flowName" type="text" value="MES 零件出库申请">
      </div>
      <div>
        <label for="mesUrl">MES 地址</label>
        <input id="mesUrl" type="url" placeholder="http://mes.example.com">
      </div>
      <button id="runSimulation" class="primary">模拟执行</button>
    </section>

    <section id="login" class="panel active" aria-labelledby="loginTitle">
      <div class="section-head">
        <div>
          <p class="eyebrow">LOGIN</p>
          <h2 id="loginTitle">系统账号登录</h2>
        </div>
      </div>
      <div class="settings-grid">
        <label>
          启用自动登录
          <select id="loginEnabled">
            <option value="true">启用</option>
            <option value="false">不启用</option>
          </select>
        </label>
        <label>
          系统账号
          <input id="loginUsername" type="text" autocomplete="username" placeholder="请输入 MES 账号">
        </label>
        <label>
          系统密码
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="请输入 MES 密码">
        </label>
        <label>
          账号输入框
          <input id="usernameTarget" type="text" placeholder="#username 或 input[name='user']">
        </label>
        <label>
          密码输入框
          <input id="passwordTarget" type="text" placeholder="#password 或 input[type='password']">
        </label>
        <label>
          登录按钮
          <input id="loginButtonTarget" type="text" placeholder="#loginBtn 或 登录">
        </label>
        <label>
          登录后等待毫秒
          <input id="loginWaitMs" type="number" min="0" step="100" value="1200">
        </label>
      </div>
      <div class="hint">
        登录按钮可填写 CSS 选择器、XPath，或按钮文字。密码会进入导出的 JSON，请只在自己电脑上保存配置。
      </div>
    </section>

    <section id="workflow" class="panel" aria-labelledby="workflowTitle">
      <div class="section-head">
        <div>
          <p class="eyebrow">CUSTOM STEPS</p>
          <h2 id="workflowTitle">点击与录入顺序</h2>
        </div>
        <div class="actions">
          <button id="addButtonStep">添加按钮点击</button>
          <button id="addStep">添加步骤</button>
        </div>
      </div>
      <div id="stepsList" class="stack"></div>
    </section>

    <section id="parts" class="panel" aria-labelledby="partsTitle">
      <div class="section-head">
        <div>
          <p class="eyebrow">PART TEMPLATES</p>
          <h2 id="partsTitle">零件选择模板</h2>
        </div>
        <button id="addPart">添加零件</button>
      </div>
      <div class="template-grid">
        <div class="editor-block">
          <label for="templateName">模板名称</label>
          <input id="templateName" type="text" value="常用出库零件">
        </div>
        <div class="editor-block">
          <label for="rowClickRule">选中行规则</label>
          <select id="rowClickRule">
            <option value="byPartCode">按零件编码所在行</option>
            <option value="fixedRow">固定行号</option>
            <option value="customSelector">自定义选择器</option>
          </select>
        </div>
        <div class="editor-block">
          <label for="finalButton">最后点击按钮</label>
          <input id="finalButton" type="text" placeholder="例如：提交、#submit、//button[.='提交']">
        </div>
      </div>
      <div id="partsList" class="stack"></div>
    </section>

    <section id="settings" class="panel" aria-labelledby="settingsTitle">
      <div class="section-head">
        <div>
          <p class="eyebrow">RUN SETTINGS</p>
          <h2 id="settingsTitle">执行参数</h2>
        </div>
      </div>
      <div class="settings-grid">
        <label>
          浏览器
          <select id="browserType">
            <option value="chrome">Chrome</option>
            <option value="edge">Edge</option>
          </select>
        </label>
        <label>
          默认等待毫秒
          <input id="defaultWait" type="number" min="0" step="100" value="800">
        </label>
        <label>
          失败处理
          <select id="failureMode">
            <option value="pause">暂停并提示</option>
            <option value="skip">跳过当前步骤</option>
            <option value="stop">停止流程</option>
          </select>
        </label>
        <label class="checkbox">
          <input id="requireConfirm" type="checkbox" checked>
          提交前二次确认
        </label>
      </div>
      <div class="hint">
        目标可以写 CSS 选择器、XPath、按钮文字、坐标，或备注给自动化脚本使用。
      </div>
    </section>

    <section id="preview" class="panel" aria-labelledby="previewTitle">
      <div class="section-head">
        <div>
          <p class="eyebrow">JSON</p>
          <h2 id="previewTitle">配置预览</h2>
        </div>
        <button id="copyConfig">复制</button>
      </div>
      <pre id="configPreview"></pre>
    </section>

    <section class="runner">
      <div class="section-head compact">
        <div>
          <p class="eyebrow">RUN LOG</p>
          <h2>执行记录</h2>
        </div>
        <button id="clearLog">清空</button>
      </div>
      <ol id="runLog"></ol>
    </section>
  </main>

  <template id="stepTemplate">
    <article class="item step-item">
      <header>
        <strong class="step-number"></strong>
        <button class="ghost remove-step">删除</button>
      </header>
      <div class="item-grid">
        <label>
          步骤名称
          <input data-field="name" type="text">
        </label>
        <label>
          动作
          <select data-field="action">
            <option value="buttonClick">只点按钮</option>
            <option value="click">点击</option>
            <option value="type">输入</option>
            <option value="select">下拉选择</option>
            <option value="wait">等待</option>
            <option value="hotkey">快捷键</option>
          </select>
        </label>
        <label>
          定位方式
          <select data-field="targetType">
            <option value="text">按钮/文字</option>
            <option value="css">CSS</option>
            <option value="xpath">XPath</option>
            <option value="coordinate">坐标</option>
            <option value="note">人工备注</option>
          </select>
        </label>
        <label>
          目标
          <input data-field="target" type="text" placeholder="例如：出库申请 / #submit / //button[.='确定']">
        </label>
        <label>
          输入/选择值
          <input data-field="value" type="text">
        </label>
        <label>
          等待毫秒
          <input data-field="waitMs" type="number" min="0" step="100">
        </label>
      </div>
    </article>
  </template>

  <template id="partTemplate">
    <article class="item part-item">
      <header>
        <strong class="part-title"></strong>
        <button class="ghost remove-part">删除</button>
      </header>
      <div class="item-grid">
        <label>
          零件编码
          <input data-field="code" type="text">
        </label>
        <label>
          零件名称
          <input data-field="name" type="text">
        </label>
        <label>
          数量
          <input data-field="quantity" type="number" min="1" step="1">
        </label>
        <label>
          行号/选择器
          <input data-field="rowTarget" type="text" placeholder="例如：3 或 tr[data-code='P001']">
        </label>
        <label>
          库位
          <input data-field="warehouse" type="text">
        </label>
        <label>
          备注
          <input data-field="remark" type="text">
        </label>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
